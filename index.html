<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Device is Infected!</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffcccb; text-align: center; }
        h1 { color: red; }
        .message { margin: 20px; font-size: 20px; }
        .button { padding: 10px 20px; font-size: 16px; background-color: red; color: white; border: none; cursor: pointer; }
    </style>
    <script>
        function showAlert() {
            alert('Warning: Your device is infected with a virus!');
        }
    </script>
</head>
<body>
    <h1>Your Device is Infected!</h1>
    <div class="message">This is a friendly prank to let you know that you need to update your virus protection!</div>
    <button class="button" onclick="showAlert()">Click Here for Details</button>
</body>
</html>
